name: Kidsclub
options:
  bundleIdPrefix: com.shimondeitel.kidsclubfees
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Kidsclub:
    type: application
    platform: iOS
    sources:
      - path: Kidsclub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kidsclubfees
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Kidsclub/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  KidsclubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KidsclubTests
      - path: Kidsclub.storekit
    dependencies:
      - target: Kidsclub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kidsclubfees.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  KidsclubUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KidsclubUITests
    dependencies:
      - target: Kidsclub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kidsclubfees.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Kidsclub:
    build:
      targets:
        Kidsclub: all
        KidsclubTests: [test]
        KidsclubUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Kidsclub.storekit
    test:
      config: Debug
      storeKitConfiguration: Kidsclub.storekit
      targets:
        - KidsclubTests
        - KidsclubUITests
    archive:
      config: Release
